name: pai_client
description: Personal AI Assistant — Desktop & Mobile Client
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  # HTTP & WebSocket
  http: ^1.2.1
  web_socket_channel: ^3.0.1
  # Voice — Groq API for STT/TTS
  audioplayers: ^6.1.0
  ffi: ^2.1.0
  # State
  provider: ^6.1.2
  # Storage
  shared_preferences: ^2.3.2
  # Animations
  flutter_animate: ^4.5.0
  # Fonts
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
